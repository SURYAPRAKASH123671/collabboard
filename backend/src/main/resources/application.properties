spring.application.name=collabboard-api
server.port=${PORT:8081}

spring.datasource.url=${COLLABBOARD_DB_URL:jdbc:mysql://localhost:3306/collabboard?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${COLLABBOARD_DB_USERNAME:root}
spring.datasource.password=${COLLABBOARD_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${COLLABBOARD_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${COLLABBOARD_JWT_SECRET:collabboard-local-dev-secret-change-me-please-32chars}
app.jwt.access-token-seconds=${COLLABBOARD_JWT_ACCESS_TOKEN_SECONDS:3600}
app.cors.allowed-origins=${COLLABBOARD_ALLOWED_ORIGINS:http://localhost:*}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
